{% extends 'base.html' %}
{% block title %}Login — Pet Rescue{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h2>Login</h2>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn btn-primary" onclick="loginUser()" style="width:100%">Login</button>

    <p style="margin-top:1rem; text-align:center;">
        Don't have an account? <a href="/users/register/">Register</a>
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loginUser() {
    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
    };

    const res = await fetch('/users/api/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
        localStorage.setItem('access_token', result.access);
        localStorage.setItem('refresh_token', result.refresh);
        localStorage.setItem('user', JSON.stringify(result.user));
        window.location.href = '/pets/list/';
    } else {
        const el = document.getElementById('error-msg');
        el.textContent = result.error || 'Login failed';
        el.style.display = 'block';
    }
}
</script>
{% endblock %}
