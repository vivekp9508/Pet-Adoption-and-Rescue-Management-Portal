{% extends 'base.html' %}
{% block title %}Register — Pet Rescue{% endblock %}

{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
    <h2>Create Account</h2>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" oninput="clearError('username-error')">
        <small class="field-error" id="username-error"></small>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" oninput="clearError('email-error')">
        <small class="field-error" id="email-error"></small>
    </div>
    <div class="form-group">
        <label>Phone (optional)</label>
        <input type="text" id="phone" placeholder="Enter 10 digit phone number" maxlength="10" oninput="clearError('phone-error')">
        <small class="field-error" id="phone-error"></small>
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" oninput="clearError('password-error')">
        <small class="field-error" id="password-error"></small>
    </div>
    <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Re-enter password" oninput="clearError('confirm-error')">
        <small class="field-error" id="confirm-error"></small>
    </div>

    <button class="btn btn-primary" onclick="registerUser()" style="width:100%">Register</button>

    <p style="margin-top:1rem; text-align:center;">
        Already have an account? <a href="/users/login/">Login</a>
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
function clearError(id) {
    document.getElementById(id).textContent = '';
}

function showFieldError(id, msg) {
    document.getElementById(id).textContent = msg;
}

function validateForm() {
    let valid = true;

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;

    // Username
    if (!username) {
        showFieldError('username-error', 'Username is required.');
        valid = false;
    } else if (username.length < 3) {
        showFieldError('username-error', 'Username must be at least 3 characters.');
        valid = false;
    } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showFieldError('username-error', 'Username can only contain letters, numbers, and underscores.');
        valid = false;
    }

    // Email
    if (!email) {
        showFieldError('email-error', 'Email is required.');
        valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showFieldError('email-error', 'Enter a valid email address (e.g. user@example.com).');
        valid = false;
    }

    // Phone (optional but must be valid if filled)
    if (phone) {
        if (!/^\d{10}$/.test(phone)) {
            showFieldError('phone-error', 'Phone number must be exactly 10 digits.');
            valid = false;
        }
    }

    // Password
    if (!password) {
        showFieldError('password-error', 'Password is required.');
        valid = false;
    } else if (!/[a-zA-Z]/.test(password)) {
        showFieldError('password-error', 'Password must contain at least one letter.');
        valid = false;
    } else if (!/[0-9]/.test(password)) {
        showFieldError('password-error', 'Password must contain at least one number.');
        valid = false;
    }

    // Confirm password
    if (!confirm) {
        showFieldError('confirm-error', 'Please confirm your password.');
        valid = false;
    } else if (password !== confirm) {
        showFieldError('confirm-error', 'Passwords do not match.');
        valid = false;
    }

    return valid;
}

async function registerUser() {
    // Clear previous alerts
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';

    if (!validateForm()) return;

    const data = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value,
    };

    try {
        const res = await fetch('/users/api/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
            localStorage.setItem('access_token', result.access);
            localStorage.setItem('refresh_token', result.refresh);
            localStorage.setItem('user', JSON.stringify(result.user));
            const el = document.getElementById('success-msg');
            el.textContent = 'Registered successfully! Redirecting...';
            el.style.display = 'block';
            setTimeout(() => window.location.href = '/pets/list/', 1500);
        } else {
            // Show server-side errors (e.g. email already exists)
            if (result.email) showFieldError('email-error', result.email[0]);
            if (result.username) showFieldError('username-error', result.username[0]);
            if (result.password) showFieldError('password-error', result.password[0]);

            const el = document.getElementById('error-msg');
            el.textContent = 'Please fix the errors above.';
            el.style.display = 'block';
        }
    } catch (err) {
        const el = document.getElementById('error-msg');
        el.textContent = 'Network error. Please try again.';
        el.style.display = 'block';
    }
}
</script>
{% endblock %}
