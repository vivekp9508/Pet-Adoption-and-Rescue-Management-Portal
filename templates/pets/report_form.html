{% extends 'base.html' %}
{% block title %}Report a Pet — Pet Rescue{% endblock %}

{% block content %}
<div class="card" style="max-width:560px; margin:0 auto;">
    <h2>Report a Lost / Found Pet</h2>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <div class="form-group">
        <label>Report Type</label>
        <select id="report_type">
            <option value="lost">Lost Pet</option>
            <option value="found">Found Pet</option>
        </select>
    </div>
    <div class="form-group">
        <label>Pet Type</label>
        <select id="pet_type" onchange="toggleOtherField()">
            <option value="dog">Dog</option>
            <option value="cat">Cat</option>
            <option value="bird">Bird</option>
            <option value="other">Other</option>
        </select>
    </div>

    <!-- Shows only when Other is selected -->
    <div class="form-group" id="other-pet-group" style="display:none;">
        <label>Please Specify Pet Type</label>
        <input type="text" id="other_pet_type" placeholder="e.g. Rabbit, Turtle, Hamster" oninput="clearError('other-pet-error')">
        <small class="field-error" id="other-pet-error"></small>
    </div>

    <div class="form-group">
        <label>Breed (optional)</label>
        <input type="text" id="breed" placeholder="e.g. Labrador">
    </div>
    <div class="form-group">
        <label>Color</label>
        <input type="text" id="color" placeholder="e.g. Brown and white" oninput="clearError('color-error')">
        <small class="field-error" id="color-error"></small>
    </div>
    <div class="form-group">
        <label>Location</label>
        <input type="text" id="location" placeholder="e.g. Near Green Park, Delhi" oninput="clearError('location-error')">
        <small class="field-error" id="location-error"></small>
    </div>
    <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="description" rows="3" placeholder="Any extra details..."></textarea>
    </div>
    <div class="form-group">
        <label>Contact Info</label>
        <select id="contact_type" onchange="updateContactPlaceholder()" style="margin-bottom:0.5rem">
            <option value="phone">Phone Number</option>
            <option value="email">Email</option>
        </select>
        <input type="text" id="contact_info" placeholder="Enter 10 digit phone number" oninput="clearError('contact-error')">
        <small class="field-error" id="contact-error"></small>
    </div>
    <div class="form-group">
        <label>Photo (optional)</label>
        <input type="file" id="image" accept="image/*">
    </div>

    <button class="btn btn-primary" onclick="submitReport()" style="width:100%">Submit Report</button>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleOtherField() {
    const petType = document.getElementById('pet_type').value;
    const otherGroup = document.getElementById('other-pet-group');
    otherGroup.style.display = petType === 'other' ? 'block' : 'none';
    if (petType !== 'other') {
        document.getElementById('other_pet_type').value = '';
        clearError('other-pet-error');
    }
}

function updateContactPlaceholder() {
    const type = document.getElementById('contact_type').value;
    const input = document.getElementById('contact_info');
    input.value = '';
    clearError('contact-error');
    input.placeholder = type === 'phone' ? 'Enter 10-digit phone number' : 'Enter email address';
}

function clearError(id) {
    document.getElementById(id).textContent = '';
}

function showFieldError(id, msg) {
    document.getElementById(id).textContent = msg;
}

function validateForm() {
    let valid = true;

    // Other pet type
    const petType = document.getElementById('pet_type').value;
    if (petType === 'other') {
        const otherVal = document.getElementById('other_pet_type').value.trim();
        if (!otherVal) {
            showFieldError('other-pet-error', 'Please specify the pet type.');
            valid = false;
        }
    }

    // Color
    const color = document.getElementById('color').value.trim();
    if (!color) {
        showFieldError('color-error', 'Color is required.');
        valid = false;
    }

    // Location
    const location = document.getElementById('location').value.trim();
    if (!location) {
        showFieldError('location-error', 'Location is required.');
        valid = false;
    }

    // Contact info
    const contactType = document.getElementById('contact_type').value;
    const contactInfo = document.getElementById('contact_info').value.trim();

    if (!contactInfo) {
        showFieldError('contact-error', 'Contact info is required.');
        valid = false;
    } else if (contactType === 'phone') {
        if (!/^\d{10}$/.test(contactInfo)) {
            showFieldError('contact-error', 'Phone number must be exactly 10 digits.');
            valid = false;
        }
    } else if (contactType === 'email') {
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactInfo)) {
            showFieldError('contact-error', 'Enter a valid email address.');
            valid = false;
        }
    }

    return valid;
}

async function refreshAccessToken() {
    const refresh = localStorage.getItem('refresh_token');
    if (!refresh) return null;

    const res = await fetch('/users/api/token/refresh/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh })
    });

    if (res.ok) {
        const data = await res.json();
        localStorage.setItem('access_token', data.access);
        return data.access;
    }
    return null;
}

async function submitReport() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';

    if (!validateForm()) return;

    let token = getToken();
    if (!token) {
        window.location.href = '/users/login/';
        return;
    }

    const petType = document.getElementById('pet_type').value;
    const finalPetType = petType === 'other'
        ? document.getElementById('other_pet_type').value.trim()
        : petType;

    const formData = new FormData();
    formData.append('report_type', document.getElementById('report_type').value);
    formData.append('pet_type', petType);
    formData.append('breed', document.getElementById('breed').value.trim());
    formData.append('color', document.getElementById('color').value.trim());
    formData.append('location', document.getElementById('location').value.trim());
    formData.append('description', document.getElementById('description').value.trim());
    formData.append('contact_info', document.getElementById('contact_info').value.trim());

    const imageFile = document.getElementById('image').files[0];
    if (imageFile) formData.append('image', imageFile);

    let res = await fetch('/pets/api/reports/create/', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
    });

    // If token expired, try refreshing once
    if (res.status === 401) {
        token = await refreshAccessToken();
        if (!token) {
            window.location.href = '/users/login/';
            return;
        }
        res = await fetch('/pets/api/reports/create/', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        });
    }

    const result = await res.json();

    if (res.ok) {
        const el = document.getElementById('success-msg');
        el.style.display = 'block';
        let seconds = 6;
        el.textContent = `Request submitted! Waiting for admin approval. Redirecting in ${seconds}s...`;
        const countdown = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = '/pets/my-reports/';
            } else {
                el.textContent = `Request submitted! Waiting for admin approval. Redirecting in ${seconds}s...`;
            }
        }, 1000);
    } else {
        const el = document.getElementById('error-msg');
        el.textContent = typeof result === 'object'
            ? Object.values(result).flat().join(' ')
            : 'Something went wrong. Please try again.';
        el.style.display = 'block';
    }
}
</script>
{% endblock %}
