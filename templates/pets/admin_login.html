{% extends 'base.html' %}
{% block title %}Admin Login — Pet Rescue{% endblock %}

{% block content %}
<div class="card" style="max-width:440px; margin:0 auto;">
    <div style="text-align:center; margin-bottom:1.5rem;">
        <div style="font-size:2.5rem;">🔐</div>
        <h2 style="margin-top:0.5rem;">Admin Login</h2>
        <p style="color:#666; font-size:0.9rem;">Restricted access — admins only</p>
    </div>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter admin email" oninput="clearError()">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" oninput="clearError()"
               onkeydown="if(event.key==='Enter') loginAdmin()">
    </div>

    <button class="btn btn-primary" onclick="loginAdmin()" style="width:100%; margin-top:0.5rem;">
        Login as Admin
    </button>
</div>
{% endblock %}

{% block extra_js %}
<script>
// If already logged in as admin, skip login page
document.addEventListener('DOMContentLoaded', function () {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const token = localStorage.getItem('access_token');
    if (token && user.is_admin_user) {
        window.location.href = '/pets/admin-dashboard/';
    }
});

function clearError() {
    const el = document.getElementById('error-msg');
    el.style.display = 'none';
    el.textContent = '';
}

async function loginAdmin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error-msg');

    if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        errorEl.style.display = 'block';
        return;
    }

    const res = await fetch('/users/api/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const result = await res.json();

    if (!res.ok) {
        errorEl.textContent = result.error || 'Invalid credentials.';
        errorEl.style.display = 'block';
        return;
    }

    if (!result.user.is_admin_user && !result.user.is_staff) {
        errorEl.textContent = 'Access denied. This page is for admins only.';
        errorEl.style.display = 'block';
        return;
    }

    localStorage.setItem('access_token', result.access);
    localStorage.setItem('refresh_token', result.refresh);
    localStorage.setItem('user', JSON.stringify(result.user));
    window.location.href = '/pets/admin-dashboard/';
}
</script>
{% endblock %}
